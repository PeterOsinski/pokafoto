services:
  drive:
    build: .
    container_name: drive
    ports:
      - "${DRIVE_PORT:-8080}:8080"
    volumes:
      - ./data:/data
    environment:
      - DRIVE_STORAGE_PATH=/data
      - DRIVE_DB_PATH=/data/drive.db
      - DRIVE_JWT_SECRET=${DRIVE_JWT_SECRET:-}
      - DRIVE_ALLOW_REGISTRATION=${DRIVE_ALLOW_REGISTRATION:-true}
      - DRIVE_PORT=${DRIVE_PORT:-8080}
      - DRIVE_S3_ENABLED=${DRIVE_S3_ENABLED:-true}
      - DRIVE_S3_ENDPOINT=${DRIVE_S3_ENDPOINT:-s3.pl-waw.scw.cloud}
      - DRIVE_S3_BUCKET=${DRIVE_S3_BUCKET:-pokafoto}
      - DRIVE_S3_ACCESS_KEY=${DRIVE_S3_ACCESS_KEY:-}
      - DRIVE_S3_SECRET_KEY=${DRIVE_S3_SECRET_KEY:-}
      - DRIVE_S3_REGION=${DRIVE_S3_REGION:-pl-waw}
      - DRIVE_BACKUP_ENABLED=${DRIVE_BACKUP_ENABLED:-false}
    restart: unless-stopped
